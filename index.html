<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tính Xấp Xỉ Tích Phân - Simpson 1/3</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

}

.container{

width:700px;
max-width:95%;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.2);

border-radius:20px;

padding:35px;

box-shadow:0 15px 35px rgba(0,0,0,.4);

color:white;

}

h1{

text-align:center;
margin-bottom:10px;
font-size:34px;

}

.subtitle{

text-align:center;
opacity:.8;
margin-bottom:30px;

}

label{

display:block;
margin-top:18px;
margin-bottom:6px;
font-weight:600;

}

input{

width:100%;
padding:14px;

border:none;
outline:none;

border-radius:10px;

background:rgba(255,255,255,.15);

color:white;

font-size:16px;

}

input::placeholder{

color:#dbeafe;

}

button{

width:100%;
margin-top:30px;

padding:15px;

border:none;

border-radius:12px;

font-size:18px;

font-weight:bold;

cursor:pointer;

background:linear-gradient(90deg,#00c6ff,#0072ff);

color:white;

transition:.3s;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 10px 20px rgba(0,114,255,.4);

}

.result{

margin-top:30px;

padding:20px;

border-radius:15px;

background:rgba(255,255,255,.08);

line-height:1.8;

}

.success{

color:#8ef58e;

font-weight:bold;

}

.error{

color:#ff9b9b;

font-weight:bold;

}

.footer{

margin-top:25px;

font-size:14px;

opacity:.75;

text-align:center;

}

code{

background:rgba(255,255,255,.15);

padding:3px 8px;

border-radius:5px;

}

</style>

</head>
<body>

<div class="container">

<h1>∫ Simpson 1/3</h1>

<div class="subtitle">
Tính xấp xỉ tích phân bằng Quy tắc Simpson 1/3
</div>

<label>Nhập hàm f(x)</label>

<input
id="func"
placeholder="Ví dụ: x*x+2*x+1 hoặc Math.sin(x)"
value="x*x"
/>

<label>Cận dưới a</label>

<input
type="number"
id="a"
placeholder="Nhập a"
/>

<label>Cận trên b</label>

<input
type="number"
id="b"
placeholder="Nhập b"
/>

<label>Số khoảng chia n (n phải chẵn)</label>

<input
type="number"
id="n"
placeholder="Ví dụ: 10"
/>

<button onclick="calculate()">

TÍNH TÍCH PHÂN

</button>

<div id="output" class="result">

Kết quả sẽ hiển thị tại đây.

</div>

<div class="footer">

Ví dụ hàm số:
<code>x*x</code>,
<code>Math.sin(x)</code>,
<code>Math.cos(x)</code>,
<code>Math.exp(x)</code>,
<code>Math.log(x)</code>

</div>

</div>

<script>

function calculate(){

let expr=document.getElementById("func").value;

let a=parseFloat(document.getElementById("a").value);

let b=parseFloat(document.getElementById("b").value);

let n=parseInt(document.getElementById("n").value);

let out=document.getElementById("output");

if(isNaN(a)||isNaN(b)||isNaN(n))
{

out.innerHTML="<div class='error'>Vui lòng nhập đầy đủ dữ liệu.</div>";

return;

}

if(n<=0){

out.innerHTML="<div class='error'>n phải lớn hơn 0.</div>";

return;

}

if(n%2!==0){

out.innerHTML="<div class='error'>Quy tắc Simpson yêu cầu n là số chẵn.</div>";

return;

}

let f;

try{

f=new Function("x","return "+expr);

f(a);

}catch(e){

out.innerHTML="<div class='error'>Biểu thức hàm số không hợp lệ.</div>";

return;

}

let h=(b-a)/n;

let sum=f(a)+f(b);

for(let i=1;i<n;i++){

let x=a+i*h;

if(i%2==0)

sum+=2*f(x);

else

sum+=4*f(x);

}

let I=(h/3)*sum;

out.innerHTML=`

<div class="success">

✔ Tính thành công

</div>

<br>

<b>Khoảng chia (h):</b> ${h}

<br><br>

<b>Giá trị tích phân xấp xỉ:</b>

<h2 style="margin-top:10px;color:#7dd3fc;">

${I}

</h2>

`;

}

</script>

</body>
</html>
